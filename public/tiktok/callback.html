<!DOCTYPE html>
<html>
<head>
<title>TikTok Auth Callback</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#0f0f23;color:#e0e0e0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
.card{background:#1a1a3e;padding:40px;border-radius:16px;max-width:600px;width:100%;text-align:center;border:1px solid #2a2a5e;}
h1{color:#69c9d0;margin-bottom:16px;font-size:22px;}
.loading{color:#f0c040;font-size:16px;}
.success{color:#22c55e;font-weight:bold;font-size:18px;}
.error{color:#ff4757;font-weight:bold;font-size:16px;}
.note{color:#888;font-size:13px;margin-top:12px;}
.btn{display:inline-block;padding:14px 28px;background:#69c9d0;color:#0f0f23;text-decoration:none;border-radius:8px;font-weight:bold;margin:16px 4px;font-size:15px;border:none;cursor:pointer;}
.btn:hover{background:#4db8c4;}
</style>
</head>
<body>
<div class="card">
<h1>TikTok Authorization</h1>
<div id="loading" class="loading">Connecting to TikTok...</div>
<div id="success" style="display:none;">
  <p class="success">TikTok Connected!</p>
  <p class="note">Redirecting to dashboard...</p>
</div>
<div id="error-result" style="display:none;">
  <p class="error">Authorization failed</p>
  <p id="error-msg" style="color:#888;font-size:13px;margin:8px 0;"></p>
  <a href="/" class="btn">Back to Dashboard</a>
</div>
</div>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const errorDesc = params.get('error_description');

  if (error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-result').style.display = 'block';
    document.getElementById('error-msg').textContent = error + ': ' + (errorDesc || '');
    return;
  }

  if (!code) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-result').style.display = 'block';
    document.getElementById('error-msg').textContent = 'No authorization code received.';
    return;
  }

  try {
    const res = await fetch('/api/tiktok', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();

    if (data.success && data.access_token) {
      localStorage.setItem('tiktok_token', JSON.stringify({
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        open_id: data.open_id,
        expires_in: data.expires_in,
        obtained_at: Date.now(),
      }));
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    } else {
      throw new Error(data.error || 'Token exchange failed');
    }
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-result').style.display = 'block';
    document.getElementById('error-msg').textContent = e.message;
  }
})();
</script>
</body>
</html>
